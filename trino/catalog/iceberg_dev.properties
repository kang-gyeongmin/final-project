connector.name=iceberg

iceberg.catalog.type=rest
iceberg.rest-catalog.uri=${ENV:R2_DEV_DATA_CATALOG_URI}
iceberg.rest-catalog.warehouse=${ENV:R2_DEV_DATA_CATALOG_WAREHOUSE}
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.token=${ENV:R2_DEV_DATA_CATALOG_TOKEN}

fs.native-s3.enabled=true
s3.region=auto
s3.endpoint=${ENV:R2_DEV_ENDPOINT}
s3.path-style-access=true
s3.aws-access-key=${ENV:R2_DEV_ACCESS_KEY_ID}
s3.aws-secret-key=${ENV:R2_DEV_SECRET_ACCESS_KEY}
