name: seoul-citydata

x-airflow-common: &airflow-common
  image: seoul-citydata-airflow:local
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_ISSUER: airflow
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow/project
    SEOUL_API_KEY: ${SEOUL_API_KEY}
    R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
    R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
    R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    R2_ENDPOINT: ${R2_ENDPOINT}
    DBT_PROFILES_DIR: /opt/airflow/dbt/seoul_ppltn
    DBT_PROJECT_DIR: /opt/airflow/dbt/seoul_ppltn
    TRINO_HOST: trino
    TRINO_PORT: "8080"
    TRINO_USER: airflow
    TRINO_ICEBERG_CATALOG: iceberg
    SMOKE_SCHEMA: seoul_ppltn
  user: "${AIRFLOW_UID}:0"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./collectors:/opt/airflow/project/collectors
    - ./data:/opt/airflow/project/data
    - ./dbt:/opt/airflow/dbt
    - airflow_logs:/opt/airflow/logs
  networks:
    - seoul_net

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - seoul_net

  trino:
    image: trinodb/trino:latest
    env_file:
      - .env
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "trino --execute 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - seoul_net

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config
        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config
        /entrypoint airflow db migrate
        /entrypoint airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" || true
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-apiserver:
        condition: service_healthy
      trino:
        condition: service_healthy

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-apiserver:
        condition: service_healthy

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-apiserver:
        condition: service_healthy

volumes:
  postgres_data:
  airflow_logs:

networks:
  seoul_net:
    name: seoul_net
