seoul_ppltn:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    prod:
      type: trino
      method: none
      host: "{{ env_var('TRINO_HOST', 'trino') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      user: "{{ env_var('TRINO_USER', 'airflow') }}"
      catalog: iceberg
      schema: seoul_ppltn
      http_scheme: "{{ env_var('TRINO_HTTP_SCHEME', 'http') }}"
      threads: 4
      timeout_seconds: 300

    dev:
      type: trino
      method: none
      host: "{{ env_var('TRINO_HOST', 'trino') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      user: "{{ env_var('TRINO_USER', 'airflow') }}"
      catalog: iceberg
      schema: seoul_ppltn
      http_scheme: "{{ env_var('TRINO_HTTP_SCHEME', 'http') }}"
      threads: 4
      timeout_seconds: 300
